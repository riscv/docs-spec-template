# Local Kroki server for Antora preview (`npm run preview` /
# `antora antora-playbook.yml`). asciidoctor-kroki sends each diagram's source to
# this server at build time and embeds the rendered SVG, so diagrams -- including
# the wavedrom example in modules/ROOT/pages/intro.adoc -- render locally without
# shipping source to a public Kroki instance.
#
# The local playbook sets `kroki-server-url: http://localhost:9870` (the same
# port the central CI setup uses), so the port mapping below must stay 9870->8000.
#
#   docker compose up -d kroki      # start before previewing
#   docker compose down             # stop when done
#
# The core image renders wavedrom, PlantUML, Graphviz, etc. Diagram types that
# need companion services (mermaid, bpmn, excalidraw) require extra containers;
# add them here if this spec starts using those.
services:
  kroki:
    image: yuzutech/kroki:latest
    ports:
      - "9870:8000"
